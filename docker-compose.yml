services:

  # -----------------------------------------------
  # Reactアプリ (Viteビルド + nginx)
  # -----------------------------------------------
  app:
    build:
      context: ./voca-master
      dockerfile: Dockerfile
    container_name: voca-app
    ports:
      - "3000:80"         # ホスト80番ポートをnginxの80番に接続
    depends_on:
      - json-server     # json-serverが起動してからappを起動する
    restart: unless-stopped

  # -----------------------------------------------
  # json-server (APIサーバー)
  # -----------------------------------------------
  json-server:
    image: node:22-alpine
    container_name: voca-json-server
    working_dir: /app
    volumes:
      - ./voca-master/src/db:/app/db
    ports:
      - "3001:3001"         # ローカルから直接確認したい場合用
    command: >
      sh -c "npm install -g json-server &&
             json-server --watch /app/db/data.json --host 0.0.0.0 --port 3001"
    restart: unless-stopped
